global:
  resolve_timeout: 5m

route:
  receiver: 'snmp-notifier'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

receivers:
  - name: 'snmp-notifier'
    webhook_configs:
      - send_resolved: true
        url: 'http://snmp-notifier:9464/alerts'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
