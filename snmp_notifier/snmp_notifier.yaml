# snmp_notifier.yml
# Configuration adaptée aux alertes Loki

defaults:
  # Timeout pour l'envoi des traps
  send_timeout: 5s

# Description des champs à inclure dans les traps SNMP
extra_field_templates:
  # Nom de l'alerte
  - name: alertname
    oid: "1.3.6.1.4.1.98789.1.1"
    template: "{{ .Labels.alertname }}"
  
  # Sévérité (critical, warning)
  - name: severity
    oid: "1.3.6.1.4.1.98789.1.2"
    template: "{{ .Labels.severity }}"
  
  # Catégorie (instant, errors, availability, stability, warnings, performance)
  - name: category
    oid: "1.3.6.1.4.1.98789.1.3"
    template: "{{ .Labels.category }}"
  
  # Job concerné
  - name: job
    oid: "1.3.6.1.4.1.98789.1.4"
    template: "{{ .Labels.job }}"
  
  # Résumé de l'alerte
  - name: summary
    oid: "1.3.6.1.4.1.98789.1.5"
    template: "{{ .Annotations.summary }}"
  
  # Description détaillée
  - name: description
    oid: "1.3.6.1.4.1.98789.1.6"
    template: "{{ .Annotations.description }}"
  
  # Statut (firing, resolved)
  - name: status
    oid: "1.3.6.1.4.1.98789.1.7"
    template: "{{ .Status }}"
  
  # Timestamp
  - name: startsAt
    oid: "1.3.6.1.4.1.98789.1.8"
    template: "{{ .StartsAt }}"
